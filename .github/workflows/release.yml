name: Release

# Build the standalone app on macOS (Apple Silicon) and Windows whenever a
# version tag is pushed, then attach the binaries to a GitHub Release.
#
#   git tag v0.4.0
#   git push --tags
#
# macOS signing/notarization is automatic when these repository secrets are set
# (Settings → Secrets and variables → Actions). Without them the macOS build is
# produced UNSIGNED, so the rest of the pipeline stays testable:
#   MACOS_CERT_P12       base64 of the Developer ID Application cert (.p12)
#   MACOS_CERT_PASSWORD  password used when exporting that .p12
#   KEYCHAIN_PASSWORD    any throwaway string (locks the temp build keychain)
#   MACOS_SIGN_IDENTITY  "Developer ID Application: Your Name (TEAMID)"
#   AC_API_KEY_ID        App Store Connect API key ID (for notarytool)
#   AC_API_ISSUER_ID     App Store Connect API issuer ID
#   AC_API_KEY           base64 of the App Store Connect API key (.p8)
#
# Windows: an Inno Setup installer (HeavisideSetup.exe) is always built. It is
# Authenticode-signed when these secrets are set; without them the installer and
# .exe are UNSIGNED (downloaders see a SmartScreen warning), so the pipeline
# stays testable:
#   WINDOWS_CERT_PFX       base64 of the code-signing certificate (.pfx)
#   WINDOWS_CERT_PASSWORD  password for that .pfx
#
# Linux: a self-contained AppImage (Heaviside-linux-x86_64.AppImage) is built
# alongside the portable .tar.gz. No signing.
#
on:
  push:
    tags:
      - "v*"
  # Manual trigger (Actions tab → Run workflow): builds and uploads the binaries
  # as downloadable run artifacts WITHOUT creating a GitHub Release. Use this to
  # test the build pipeline without consuming a real version tag.
  workflow_dispatch:

permissions:
  contents: write   # needed to create the Release and upload assets

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-15 runners are native Apple Silicon (arm64), free for public
          # repos. This produces an Apple-Silicon-native .app.
          - os: macos-15
            label: macOS (Apple Silicon)
            artifact: Heaviside-macos-arm64.dmg
          - os: windows-latest
            label: Windows (x64)
            artifact: Heaviside-windows-x64.zip
          - os: ubuntu-latest
            label: Linux (x64)
            artifact: Heaviside-linux-x64.tar.gz

    steps:
      # Third-party actions are pinned to commit SHAs (not mutable tags) because
      # this workflow holds contents:write and the signing secrets. To bump one,
      # resolve the new tag: gh api repos/<owner>/<repo>/git/ref/tags/<tag>
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      # Linux: PyInstaller bundles the Qt shared libraries, but they must be
      # present on the build host for PyInstaller to find them. (Not needed on
      # the macOS/Windows runners, where PySide6's wheels carry them.)
      - name: Install Qt system libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 libglib2.0-0

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      # Refresh the canonical license texts that the bundle's LGPLv3 notice
      # references (GPL-3.0.txt is not committed; LGPL-3.0.txt is). The committed
      # LGPL text is the fallback if the network is unavailable. This workflow
      # calls pyinstaller directly, so it performs the build prep steps that
      # scripts/build.py would otherwise do.
      - name: Fetch third-party license texts
        shell: bash
        run: |
          curl -sSL --max-time 20 https://www.gnu.org/licenses/lgpl-3.0.txt -o licenses/LGPL-3.0.txt || true
          curl -sSL --max-time 20 https://www.gnu.org/licenses/gpl-3.0.txt  -o licenses/GPL-3.0.txt  || true
          test -s licenses/LGPL-3.0.txt || { echo "::error::licenses/LGPL-3.0.txt missing"; exit 1; }

      # Regenerate both app icons (.ico + .icns) from assets/icon.png so the
      # bundle is branded. Cross-platform (Pillow only), so one step covers every
      # runner; heaviside.spec then picks the right format per platform.
      - name: Regenerate app icons
        run: uv run python scripts/make_icons.py

      - name: Build the app (PyInstaller)
        run: uv run pyinstaller --noconfirm --clean heaviside.spec

      # macOS signing + notarization (steps below) only runs when the signing
      # secrets are configured. A run without them — a fork, or a
      # workflow_dispatch test before the secrets are added — still produces an
      # UNSIGNED build instead of failing, so the pipeline stays testable.
      - name: Check for signing credentials (macOS)
        if: runner.os == 'macOS'
        id: signing
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
        run: |
          if [ -n "$MACOS_CERT_P12" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::macOS signing secrets are not set — producing an UNSIGNED, un-notarized build. Downloaders will see a Gatekeeper warning."
          fi

      # Import the Developer ID Application certificate into a throwaway keychain
      # scoped to this run. set-key-partition-list authorises codesign to use the
      # imported key without an interactive prompt.
      - name: Import Developer ID certificate (macOS)
        if: runner.os == 'macOS' && steps.signing.outputs.enabled == 'true'
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          echo "$MACOS_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null
          # Make the temp keychain searchable so codesign finds the identity.
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          rm -f "$RUNNER_TEMP/cert.p12"

      # Sign the whole bundle (inner libraries included, via --deep) with the
      # hardened runtime, a secure timestamp, and the entitlements a PyInstaller
      # app needs — all prerequisites for notarization.
      - name: Sign the app (macOS)
        if: runner.os == 'macOS' && steps.signing.outputs.enabled == 'true'
        env:
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
        run: |
          codesign --force --deep --timestamp --options runtime \
            --entitlements packaging/entitlements.plist \
            --sign "$MACOS_SIGN_IDENTITY" dist/Heaviside.app
          codesign --verify --deep --strict --verbose=2 dist/Heaviside.app

      # Wrap the (signed) .app in a drag-to-Applications .dmg. dmgbuild is pulled
      # in just for this run (it is not a project dependency, so the frozen lock
      # stays valid); scripts/make_dmg.py regenerates the background art and
      # builds the image per packaging/dmg_settings.py. Runs whether or not
      # signing is enabled, so an unsigned test build still produces a .dmg.
      - name: Build the .dmg (macOS)
        if: runner.os == 'macOS'
        run: uv run --with dmgbuild python scripts/make_dmg.py "${{ matrix.artifact }}" dist/Heaviside.app

      # Sign the .dmg, then submit it to Apple's notary service (which registers
      # the contained app's code-signing hash) and staple the ticket onto the
      # .dmg so Gatekeeper passes even offline. Uses an App Store Connect API key
      # (.p8). Only runs when signing secrets are configured.
      - name: Sign, notarize, and staple the .dmg (macOS)
        if: runner.os == 'macOS' && steps.signing.outputs.enabled == 'true'
        env:
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          AC_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
          AC_API_KEY: ${{ secrets.AC_API_KEY }}
        run: |
          codesign --force --timestamp --sign "$MACOS_SIGN_IDENTITY" "${{ matrix.artifact }}"
          echo "$AC_API_KEY" | base64 --decode > "$RUNNER_TEMP/api_key.p8"
          xcrun notarytool submit "${{ matrix.artifact }}" \
            --key "$RUNNER_TEMP/api_key.p8" \
            --key-id "$AC_API_KEY_ID" \
            --issuer "$AC_API_ISSUER_ID" \
            --wait
          xcrun stapler staple "${{ matrix.artifact }}"
          rm -f "$RUNNER_TEMP/api_key.p8"

      # ── Windows installer (Inno Setup) ───────────────────────────────────
      # Built on every Windows run. Authenticode signing of the .exe and the
      # installer is conditional on the WINDOWS_CERT_* secrets, mirroring the
      # macOS signing pattern — an unsigned build still produces a usable
      # installer so the pipeline stays testable.
      - name: Install Inno Setup (Windows)
        if: runner.os == 'Windows'
        run: choco install innosetup --no-progress -y

      - name: Check for signing credentials (Windows)
        if: runner.os == 'Windows'
        id: winsign
        shell: bash
        env:
          WINDOWS_CERT_PFX: ${{ secrets.WINDOWS_CERT_PFX }}
        run: |
          if [ -n "$WINDOWS_CERT_PFX" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Windows signing secrets are not set — producing an UNSIGNED installer. Downloaders will see a SmartScreen warning."
          fi

      # Locate signtool (Windows SDK) and sign the app .exe BEFORE it is packed
      # into the installer, then the installer is signed after it is built.
      - name: Decode signing certificate (Windows)
        if: runner.os == 'Windows' && steps.winsign.outputs.enabled == 'true'
        shell: pwsh
        env:
          WINDOWS_CERT_PFX: ${{ secrets.WINDOWS_CERT_PFX }}
        run: |
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\cert.pfx", [Convert]::FromBase64String($env:WINDOWS_CERT_PFX))
          $st = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" | Sort-Object FullName | Select-Object -Last 1
          echo "SIGNTOOL=$($st.FullName)" >> $env:GITHUB_ENV

      - name: Sign the app executable (Windows)
        if: runner.os == 'Windows' && steps.winsign.outputs.enabled == 'true'
        shell: pwsh
        env:
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          & "$env:SIGNTOOL" sign /f "$env:RUNNER_TEMP\cert.pfx" /p "$env:WINDOWS_CERT_PASSWORD" `
            /fd sha256 /tr http://timestamp.digicert.com /td sha256 "dist\Heaviside\Heaviside.exe"

      - name: Build the installer (Windows)
        if: runner.os == 'Windows'
        run: uv run python scripts/make_installer.py "Heaviside-windows-x64-setup.exe" "dist/Heaviside"

      - name: Sign the installer (Windows)
        if: runner.os == 'Windows' && steps.winsign.outputs.enabled == 'true'
        shell: pwsh
        env:
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          & "$env:SIGNTOOL" sign /f "$env:RUNNER_TEMP\cert.pfx" /p "$env:WINDOWS_CERT_PASSWORD" `
            /fd sha256 /tr http://timestamp.digicert.com /td sha256 "Heaviside-windows-x64-setup.exe"
          Remove-Item "$env:RUNNER_TEMP\cert.pfx" -Force

      # ── Linux AppImage ───────────────────────────────────────────────────
      # Built on every Linux run, alongside the portable .tar.gz. appimagetool is
      # itself an AppImage; APPIMAGE_EXTRACT_AND_RUN (set by make_appimage.py)
      # lets it run without FUSE on the runner.
      # appimagetool ships only via a mutable "continuous" release, so the
      # download is pinned by SHA-256. When upstream rebuilds, this step fails
      # closed; refresh the pin by downloading the new file, verifying it, and
      # updating APPIMAGETOOL_SHA256 below.
      - name: Install appimagetool (Linux)
        if: runner.os == 'Linux'
        env:
          APPIMAGETOOL_SHA256: a6d71e2b6cd66f8e8d16c37ad164658985e0cf5fcaa950c90a482890cb9d13e0
        run: |
          curl -sSL -o appimagetool-x86_64.AppImage \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          echo "$APPIMAGETOOL_SHA256  appimagetool-x86_64.AppImage" | sha256sum -c -
          sudo mv appimagetool-x86_64.AppImage /usr/local/bin/appimagetool
          sudo chmod +x /usr/local/bin/appimagetool

      - name: Build the AppImage (Linux)
        if: runner.os == 'Linux'
        run: uv run python scripts/make_appimage.py "Heaviside-linux-x86_64.AppImage" "dist/Heaviside"

      # The .dmg is already the single release artifact; just emit its SHA-256
      # for download verification.
      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: shasum -a 256 "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256"

      # Windows: zip the (portable) onedir folder and emit SHA-256s for both the
      # zip and the installer built above.
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/Heaviside/*" -DestinationPath "${{ matrix.artifact }}"
          (Get-FileHash "${{ matrix.artifact }}" -Algorithm SHA256).Hash.ToLower() + "  ${{ matrix.artifact }}" | Out-File -Encoding ascii "${{ matrix.artifact }}.sha256"
          (Get-FileHash "Heaviside-windows-x64-setup.exe" -Algorithm SHA256).Hash.ToLower() + "  Heaviside-windows-x64-setup.exe" | Out-File -Encoding ascii "Heaviside-windows-x64-setup.exe.sha256"

      # Linux: tar+gzip the onedir folder (preserves the executable bit); emit a
      # SHA-256 for it and for the AppImage built above.
      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          tar -czf "${{ matrix.artifact }}" -C dist Heaviside
          sha256sum "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256"
          sha256sum "Heaviside-linux-x86_64.AppImage" > "Heaviside-linux-x86_64.AppImage.sha256"

      - name: Upload build artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: ${{ matrix.artifact }}
          # The Windows installer only exists on the Windows runner; the glob is
          # ignored (not an error) on macOS/Linux.
          if-no-files-found: ignore
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256
            Heaviside-windows-x64-setup.exe
            Heaviside-windows-x64-setup.exe.sha256
            Heaviside-linux-x86_64.AppImage
            Heaviside-linux-x86_64.AppImage.sha256

  # Re-render the README example-gallery screenshots from this release's code
  # and examples (scripts/render_screenshots.py — the full editor GUI grabbed
  # under offscreen Qt, no display) and commit them to main when the pixels
  # changed, so the README gallery always matches the latest release. Skipped
  # on workflow_dispatch test runs.
  screenshots:
    name: Refresh README screenshots
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      # texlive: pdflatex + standalone + circuitikz so the editor's live PDF
      # preview pane compiles for the screenshots. (No dvisvgm — canvas math
      # labels render through the bundled ziamath fallback, deterministic
      # across runners.)
      - name: Install Qt system libraries and LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 libglib2.0-0 \
            texlive-latex-base texlive-pictures texlive-latex-extra

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Render example screenshots
        run: QT_QPA_PLATFORM=offscreen uv run python scripts/render_screenshots.py

      # The job checked out the tag; the screenshots are committed onto main.
      # [skip ci] keeps the docs-only commit from burning a CI run. If main
      # advances between fetch and push the push fails loudly — re-run the job.
      - name: Commit refreshed screenshots to main
        run: |
          cp -r docs/images/examples "$RUNNER_TEMP/example-shots"
          git fetch origin main
          git checkout -B main origin/main
          rm -rf docs/images/examples
          mkdir -p docs/images
          cp -r "$RUNNER_TEMP/example-shots" docs/images/examples
          git add docs/images/examples
          if git diff --cached --quiet; then
            echo "Screenshots unchanged - nothing to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "docs: refresh README example screenshots for ${GITHUB_REF_NAME} [skip ci]"
            git push origin main
          fi

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    # Only create a GitHub Release for an actual tag push. A manual
    # (workflow_dispatch) run skips this job, so the build is tested without
    # producing a release — the binaries are still available as run artifacts.
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          path: artifacts
          merge-multiple: true

      - name: Create / update the GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          files: artifacts/**
          draft: true            # review the assets, then publish manually
          generate_release_notes: true
