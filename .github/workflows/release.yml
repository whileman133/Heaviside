name: Release

# Build the standalone app on macOS (Apple Silicon) and Windows whenever a
# version tag is pushed, then attach the binaries to a GitHub Release.
#
#   git tag v0.4.0
#   git push --tags
#
# macOS signing/notarization is automatic when these repository secrets are set
# (Settings → Secrets and variables → Actions). Without them the macOS build is
# produced UNSIGNED, so the rest of the pipeline stays testable:
#   MACOS_CERT_P12       base64 of the Developer ID Application cert (.p12)
#   MACOS_CERT_PASSWORD  password used when exporting that .p12
#   KEYCHAIN_PASSWORD    any throwaway string (locks the temp build keychain)
#   MACOS_SIGN_IDENTITY  "Developer ID Application: Your Name (TEAMID)"
#   AC_API_KEY_ID        App Store Connect API key ID (for notarytool)
#   AC_API_ISSUER_ID     App Store Connect API issuer ID
#   AC_API_KEY           base64 of the App Store Connect API key (.p8)
#
on:
  push:
    tags:
      - "v*"
  # Manual trigger (Actions tab → Run workflow): builds and uploads the binaries
  # as downloadable run artifacts WITHOUT creating a GitHub Release. Use this to
  # test the build pipeline without consuming a real version tag.
  workflow_dispatch:

permissions:
  contents: write   # needed to create the Release and upload assets

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-15 runners are native Apple Silicon (arm64), free for public
          # repos. This produces an Apple-Silicon-native .app.
          - os: macos-15
            label: macOS (Apple Silicon)
            artifact: Heaviside-macos-arm64.zip
          - os: windows-latest
            label: Windows (x64)
            artifact: Heaviside-windows-x64.zip
          - os: ubuntu-latest
            label: Linux (x64)
            artifact: Heaviside-linux-x64.tar.gz

    steps:
      - uses: actions/checkout@v5

      # Linux: PyInstaller bundles the Qt shared libraries, but they must be
      # present on the build host for PyInstaller to find them. (Not needed on
      # the macOS/Windows runners, where PySide6's wheels carry them.)
      - name: Install Qt system libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 libglib2.0-0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      # Refresh the canonical license texts that the bundle's LGPLv3 notice
      # references (GPL-3.0.txt is not committed; LGPL-3.0.txt is). The committed
      # LGPL text is the fallback if the network is unavailable. This workflow
      # calls pyinstaller directly, so it performs the build prep steps that
      # scripts/build.py would otherwise do.
      - name: Fetch third-party license texts
        shell: bash
        run: |
          curl -sSL --max-time 20 https://www.gnu.org/licenses/lgpl-3.0.txt -o licenses/LGPL-3.0.txt || true
          curl -sSL --max-time 20 https://www.gnu.org/licenses/gpl-3.0.txt  -o licenses/GPL-3.0.txt  || true
          test -s licenses/LGPL-3.0.txt || { echo "::error::licenses/LGPL-3.0.txt missing"; exit 1; }

      # Regenerate both app icons (.ico + .icns) from assets/icon.png so the
      # bundle is branded. Cross-platform (Pillow only), so one step covers every
      # runner; heaviside.spec then picks the right format per platform.
      - name: Regenerate app icons
        run: uv run python scripts/make_icons.py

      - name: Build the app (PyInstaller)
        run: uv run pyinstaller --noconfirm --clean heaviside.spec

      # macOS signing + notarization (steps below) only runs when the signing
      # secrets are configured. A run without them — a fork, or a
      # workflow_dispatch test before the secrets are added — still produces an
      # UNSIGNED build instead of failing, so the pipeline stays testable.
      - name: Check for signing credentials (macOS)
        if: runner.os == 'macOS'
        id: signing
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
        run: |
          if [ -n "$MACOS_CERT_P12" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::macOS signing secrets are not set — producing an UNSIGNED, un-notarized build. Downloaders will see a Gatekeeper warning."
          fi

      # Import the Developer ID Application certificate into a throwaway keychain
      # scoped to this run. set-key-partition-list authorises codesign to use the
      # imported key without an interactive prompt.
      - name: Import Developer ID certificate (macOS)
        if: runner.os == 'macOS' && steps.signing.outputs.enabled == 'true'
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          echo "$MACOS_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null
          # Make the temp keychain searchable so codesign finds the identity.
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          rm -f "$RUNNER_TEMP/cert.p12"

      # Sign the whole bundle (inner libraries included, via --deep) with the
      # hardened runtime, a secure timestamp, and the entitlements a PyInstaller
      # app needs — all prerequisites for notarization.
      - name: Sign the app (macOS)
        if: runner.os == 'macOS' && steps.signing.outputs.enabled == 'true'
        env:
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
        run: |
          codesign --force --deep --timestamp --options runtime \
            --entitlements packaging/entitlements.plist \
            --sign "$MACOS_SIGN_IDENTITY" dist/Heaviside.app
          codesign --verify --deep --strict --verbose=2 dist/Heaviside.app

      # Submit to Apple's notary service and wait for the verdict, then staple
      # the ticket onto the .app so Gatekeeper passes even offline. Uses an App
      # Store Connect API key (.p8) rather than an Apple ID + app password.
      - name: Notarize and staple (macOS)
        if: runner.os == 'macOS' && steps.signing.outputs.enabled == 'true'
        env:
          AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          AC_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
          AC_API_KEY: ${{ secrets.AC_API_KEY }}
        run: |
          echo "$AC_API_KEY" | base64 --decode > "$RUNNER_TEMP/api_key.p8"
          # notarytool uploads an archive, not the .app directory itself.
          ditto -c -k --keepParent dist/Heaviside.app "$RUNNER_TEMP/notarize.zip"
          xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
            --key "$RUNNER_TEMP/api_key.p8" \
            --key-id "$AC_API_KEY_ID" \
            --issuer "$AC_API_ISSUER_ID" \
            --wait
          xcrun stapler staple dist/Heaviside.app
          rm -f "$RUNNER_TEMP/api_key.p8" "$RUNNER_TEMP/notarize.zip"

      # macOS: an .app is a directory of many files (including framework symlinks
      # that a plain zip would mangle), so use ditto, which is the macOS-correct
      # archiver. Runs after signing/stapling above so the zip carries the
      # notarization ticket. Then emit a SHA-256 for download verification.
      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist
          ditto -c -k --keepParent "Heaviside.app" "../${{ matrix.artifact }}"
          cd ..
          shasum -a 256 "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256"

      # Windows: zip the onedir folder; emit a SHA-256 alongside.
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/Heaviside/*" -DestinationPath "${{ matrix.artifact }}"
          (Get-FileHash "${{ matrix.artifact }}" -Algorithm SHA256).Hash.ToLower() + "  ${{ matrix.artifact }}" | Out-File -Encoding ascii "${{ matrix.artifact }}.sha256"

      # Linux: tar+gzip the onedir folder (preserves the executable bit); emit a
      # SHA-256 alongside.
      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          tar -czf "${{ matrix.artifact }}" -C dist Heaviside
          sha256sum "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    # Only create a GitHub Release for an actual tag push. A manual
    # (workflow_dispatch) run skips this job, so the build is tested without
    # producing a release — the binaries are still available as run artifacts.
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true

      - name: Create / update the GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/**
          draft: true            # review the assets, then publish manually
          generate_release_notes: true
