name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel an in-progress run when a newer commit is pushed to the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    env:
      # Qt has no display on the runner; use its headless platform plugin.
      QT_QPA_PLATFORM: offscreen

    steps:
      - uses: actions/checkout@v6.0.3

      # PySide6/Qt links against system graphics + input libraries that are not
      # present on the GitHub runner by default. Without these, importing QtGui
      # fails with "libEGL.so.1: cannot open shared object file".
      - name: Install Qt system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 \
            libgl1 \
            libxkbcommon0 \
            libdbus-1-3 \
            libglib2.0-0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      # --frozen installs exactly what uv.lock pins (fails if the lockfile is out
      # of date), so CI is reproducible and catches an un-synced lockfile.
      - name: Install dependencies
        run: uv sync --frozen --python ${{ matrix.python-version }}

      - name: Run test suite
        # The fast suite only. The @slow component-store reproducibility test
        # needs latex+dvisvgm (not installed here) AND the exact CircuiTikZ the
        # committed files were rendered with, so it is a local/manual check
        # (`pytest --run-slow`), never run in CI — see tests/conftest.py.
        run: uv run --frozen --python ${{ matrix.python-version }} pytest
