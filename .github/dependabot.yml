version: 2
updates:
  # Keep the GitHub Actions used in workflows up to date (e.g. Node-runtime
  # deprecations like actions/checkout and astral-sh/setup-uv).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      # Bundle all action bumps into one PR to reduce noise.
      github-actions:
        patterns:
          - "*"

  # Keep Python dependencies (resolved in uv.lock) up to date.
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      python-dependencies:
        patterns:
          - "*"
